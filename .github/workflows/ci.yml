name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Type-check, build & offline tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type-check (zero errors)
        run: npm run typecheck
      - name: Build (engine + web + server)
        run: npm run build
      - name: Unit + integration + component tests
        run: npm test

  db-integration:
    name: DB integration (migrations + seed)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: escape_plan
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Server tests against real Postgres
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/escape_plan
        run: npm run test --workspace @escape-plan/server

  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: apps/web
      - name: Run E2E journey
        run: npm run test:e2e
