<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Escape Plan — an intelligent annual-leave planner that generates optimised holiday plans."
    />
    <title>Escape Plan — Smart annual-leave planner</title>
    <script>
      // Set theme before first paint to avoid a flash.
      (function () {
        try {
          var stored = localStorage.getItem('escape-plan-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (stored === 'dark' || (!stored && prefersDark)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
